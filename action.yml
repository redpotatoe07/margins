name: 'Margins'
description: 'Self-hosted PR auto-reviewer using Anthropic API'
author: 'redpotatoe07'

inputs:
  anthropic-api-key:
    description: 'Anthropic API key'
    required: true
  github-token:
    description: 'GitHub token for posting review comments'
    required: true
    default: ${{ github.token }}
  model:
    description: 'Anthropic model to use'
    required: false
    default: 'claude-haiku-4-5'
  max-tokens-per-pr:
    description: 'Max output tokens per PR review'
    required: false
    default: '8000'
  confidence-threshold:
    description: 'Minimum confidence (0-1) for posting findings'
    required: false
    default: '0.7'
  allowed-authors:
    description: 'Comma-separated list of GitHub usernames whose PRs trigger review'
    required: false
    default: ''
  monthly-quota:
    description: 'Maximum reviews per repo per calendar month'
    required: false
    default: '500'

runs:
  using: 'node20'
  main: 'dist/index.js'
